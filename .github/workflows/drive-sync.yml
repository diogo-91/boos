name: Drive Sync (incremental)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/drive/sync
        run: |
          curl --fail --silent --show-error \
            -X POST "https://painel-painel.yi4kjc.easypanel.host/api/drive/sync" \
            -H "x-sync-secret: ${{ secrets.DRIVE_SYNC_SECRET }}"
