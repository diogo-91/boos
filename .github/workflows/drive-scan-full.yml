name: Drive Scan Full (rede de segurança)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

jobs:
  scan-full:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar /api/drive/scan-full
        run: |
          curl --fail --silent --show-error \
            -X POST "https://painel-painel.yi4kjc.easypanel.host/api/drive/scan-full" \
            -H "x-sync-secret: ${{ secrets.DRIVE_SYNC_SECRET }}"
